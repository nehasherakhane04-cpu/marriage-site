<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Happy Marriage Life</title>
    <style>
        body {
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            text-align: center;
            font-family: Arial;
            color: white;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            font-size: 40px;
        }

        h2 {
            font-size: 30px;
            margin: 10px 0;
        }

        p {
            font-size: 22px;
        }

        .lines {
            margin-top: 15px;
            font-size: 18px;
            line-height: 1.5;
        }

        .heart {
            font-size: 50px;
            animation: blink 1.2s infinite;
            margin-top: 15px;
        }

        @keyframes blink {
            0% {opacity: 1;}
            50% {opacity: 0.5;}
            100% {opacity: 1;}
        }

        /* petals */
        .petal {
            position: absolute;
            top: -10px;
            font-size: 20px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh);
            }
        }
    </style>
</head>

<body>

    <h1>💖 Happy Marriage Life 💖</h1>
    <h2> Amith ❤️ Sanjana </h2>
    <p>Stay Khush 😊 Always Together Forever 💍</p>

    <!-- Romantic Lines -->
    <div class="lines">
        💕 Two hearts, one soul 💕<br>
        💫 Made for each other 💫<br>
        🌸 Forever begins today 🌸<br>
        💖 Love, trust &amp; happiness always 💖
    </div>

    <div class="heart">❤️ ❤️ ❤️</div>

    <!-- Falling petals -->
    <script>
        setInterval(() => {
            let p = document.createElement("div");
            p.className = "petal";
            p.innerHTML = "🌹";

            p.style.left = Math.random() * window.innerWidth + "px";
            p.style.animationDuration = (3 + Math.random() * 3) + "s";

            document.body.appendChild(p);

            setTimeout(() => p.remove(), 6000);
        }, 400);
    </script>
